<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant — Pariyr Roshan Kumar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #0D1B2A; --ink: #1C2B3A; --slate: #3D5166;
      --gold: #C9A84C; --gold-lt: #E8C96B; --cream: #F7F3EC;
      --white: #FFFFFF; --muted: #8A9BAD; --border: rgba(201,168,76,0.22);
      --user-bg: #1E3246; --ai-bg: #162230;
    }
    html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--navy); color: var(--cream); overflow: hidden; }
    .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; max-width: 860px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: var(--ink); border-bottom: 1px solid var(--border); }
    .header-left { display: flex; align-items: center; gap: 0.9rem; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), #7B5EA7); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--white); font-weight: 700; }
    .header-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.6); display: inline-block; margin-right: 0.4rem; }
    .back-link { font-size: 0.78rem; color: var(--muted); text-decoration: none; letter-spacing: 0.04em; transition: color 0.2s; }
    .back-link:hover { color: var(--gold); }
    #messages { overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; scroll-behavior: smooth; }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { display: flex; gap: 0.75rem; max-width: 100%; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; flex-shrink: 0; margin-top: 2px; }
    .msg.ai .msg-avatar { background: linear-gradient(135deg, var(--gold), #7B5EA7); }
    .msg.user .msg-avatar { background: var(--slate); }
    .msg-bubble { max-width: 75%; padding: 0.85rem 1.1rem; border-radius: 12px; font-size: 0.9rem; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .msg.ai .msg-bubble { background: var(--ai-bg); border: 1px solid var(--border); color: var(--cream); border-top-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--user-bg); border: 1px solid rgba(61,81,102,0.5); color: var(--white); border-top-right-radius: 4px; }
    .typing-dots { display: flex; gap: 4px; padding: 0.5rem 0; }
    .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--gold); opacity: 0.4; animation: blink 1.2s infinite ease-in-out; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.85); } 40% { opacity: 1; transform: scale(1); } }
    .input-area { padding: 1rem 1.5rem 1.5rem; background: var(--ink); border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 0.75rem; align-items: flex-end; }
    #user-input { flex: 1; background: var(--navy); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; color: var(--cream); font-size: 0.9rem; font-family: 'Inter', sans-serif; resize: none; outline: none; min-height: 44px; max-height: 140px; line-height: 1.5; transition: border-color 0.2s; }
    #user-input:focus { border-color: var(--gold); }
    #user-input::placeholder { color: var(--muted); }
    #send-btn { width: 44px; height: 44px; flex-shrink: 0; border-radius: 10px; background: var(--gold); border: none; color: var(--navy); font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; }
    #send-btn:hover:not(:disabled) { background: var(--gold-lt); transform: scale(1.05); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-hint { font-size: 0.7rem; color: var(--muted); margin-top: 0.5rem; text-align: center; }
    .suggestions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .suggestion-chip { background: var(--navy); border: 1px solid var(--border); border-radius: 20px; padding: 0.35rem 0.85rem; font-size: 0.75rem; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .suggestion-chip:hover { border-color: var(--gold); color: var(--gold); }
    .welcome-msg { text-align: center; padding: 2rem 1rem; color: var(--muted); }
    .welcome-msg .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .welcome-msg h2 { font-family: 'Playfair Display', serif; color: var(--white); font-size: 1.3rem; margin-bottom: 0.5rem; }
    .welcome-msg p { font-size: 0.85rem; max-width: 340px; margin: 0 auto; }
    @media (max-width: 600px) { .msg-bubble { max-width: 88%; } header { padding: 0.75rem 1rem; } #messages { padding: 1rem; } .input-area { padding: 0.75rem 1rem 1rem; } }
    @media (prefers-reduced-motion: reduce) { .msg { animation: none; } .typing-dots span { animation: none; opacity: 1; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div>
        <div class="header-title">AI Assistant</div>
        <div class="header-sub"><span class="status-dot"></span>Ready to help</div>
      </div>
    </div>
    <a class="back-link" href="index.html">← Portfolio</a>
  </header>

  <div id="messages">
    <div class="welcome-msg">
      <div class="icon">✨</div>
      <h2>How can I help you today?</h2>
      <p>Ask me anything — I'm a general-purpose AI assistant ready to answer questions, help with writing, explain concepts, and more.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="suggestions" id="suggestions">
      <button class="suggestion-chip" onclick="useChip(this)">Explain a business concept</button>
      <button class="suggestion-chip" onclick="useChip(this)">Help me write an email</button>
      <button class="suggestion-chip" onclick="useChip(this)">What is international trade?</button>
      <button class="suggestion-chip" onclick="useChip(this)">Summarize a topic</button>
    </div>
    <div class="input-row">
      <textarea id="user-input" placeholder="Type your message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
    <p class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
  </div>
</div>

<script>
  // Simple rule-based AI — works for everyone, no API key needed
  const knowledge = [
    { k: ['hello','hi','hey','howdy'], r: "Hello! I'm your AI assistant. How can I help you today?" },
    { k: ['international trade','trade','import','export','tariff','customs'], r: "International trade involves the exchange of goods and services across borders. Key concepts include:\n\n• Tariffs — taxes on imported goods\n• Trade agreements (e.g. WTO, FTAs) — reduce barriers between countries\n• Comparative advantage — countries export what they produce most efficiently\n• Balance of trade — difference between exports and imports\n\nWould you like to dive deeper into any of these?" },
    { k: ['globalization','globalisation'], r: "Globalization is the process by which businesses, cultures, and economies become interconnected worldwide. It has led to:\n\n• Faster flow of goods, capital, and information\n• Rise of multinational corporations\n• Increased economic interdependence between nations\n• Cultural exchange and influence\n\nIt has both benefits (economic growth, innovation) and challenges (inequality, environmental impact)." },
    { k: ['supply chain','logistics'], r: "A supply chain is the network of organizations involved in producing and delivering a product — from raw materials to the end customer.\n\nKey stages: Sourcing → Manufacturing → Warehousing → Distribution → Retail → Customer\n\nEfficient supply chains reduce costs and improve delivery speed. Disruptions (like COVID-19) revealed how fragile global supply chains can be." },
    { k: ['gdp','gross domestic product'], r: "GDP (Gross Domestic Product) is the total monetary value of all goods and services produced in a country over a specific period.\n\nIt's the most widely used measure of economic size and growth.\n\nFormula: GDP = Consumption + Investment + Government Spending + (Exports − Imports)" },
    { k: ['inflation','price','prices'], r: "Inflation is the rate at which the general level of prices for goods and services rises over time, reducing purchasing power.\n\n• Low, stable inflation (~2%) is generally considered healthy\n• High inflation erodes savings and reduces living standards\n• Central banks (like the Federal Reserve or Bank of Korea) manage inflation through interest rate policy" },
    { k: ['email','write','draft','letter'], r: "I'd be happy to help you draft an email! Here's a professional template:\n\nSubject: [Clear, specific subject]\n\nDear [Name],\n\nI hope this message finds you well. I am writing to [state your purpose clearly].\n\n[Main body — be concise and specific. State what you need or are offering.]\n\nI would appreciate your response at your earliest convenience. Please feel free to contact me if you have any questions.\n\nBest regards,\nPariyr Roshan Kumar\nKonkuk University\n\nWant me to customize this for a specific situation?" },
    { k: ['marketing','market','advertis'], r: "Marketing involves promoting and selling products or services. Key concepts:\n\n• 4 Ps: Product, Price, Place, Promotion\n• Target market — identifying your ideal customer\n• Digital marketing — SEO, social media, email campaigns\n• Brand management — building a consistent identity\n• Market research — understanding customer needs and competition" },
    { k: ['korea','korean','seoul','konkuk'], r: "South Korea is one of Asia's most dynamic economies — known as the 'Miracle on the Han River.' It's home to global brands like Samsung, LG, Hyundai, and SK.\n\nSeoul, the capital, is a major financial and tech hub. Konkuk University is a well-respected university in Seoul with strong programs in business and international studies.\n\nSouth Korea is a major exporter of electronics, automobiles, and K-culture (music, film, food)." },
    { k: ['finance','financial','investment','stock','forex'], r: "Finance covers the management of money and investments. Key areas:\n\n• Personal finance — budgeting, saving, investing\n• Corporate finance — how companies fund operations and growth\n• International finance — foreign exchange, global investment flows\n• Financial markets — stocks, bonds, commodities, forex\n\nThe foreign exchange (forex) market is the largest in the world, trading over $7 trillion daily." },
    { k: ['resume','cv','job','career','internship'], r: "Here are tips for a strong resume as an international commerce student:\n\n• Keep it to 1 page\n• Start with a clear objective/summary\n• Highlight relevant coursework (trade policy, economics, marketing)\n• Include any language skills — very valuable in international business\n• Add clubs, projects, or volunteer work\n• Use action verbs: analyzed, coordinated, presented, researched\n\nWould you like help drafting a specific section?" },
    { k: ['ai','artificial intelligence','machine learning'], r: "AI (Artificial Intelligence) refers to machines that simulate human intelligence — learning, reasoning, and problem-solving.\n\nIn business, AI is used for:\n• Customer service chatbots (like me!)\n• Market trend prediction\n• Supply chain optimization\n• Fraud detection in finance\n• Personalized marketing\n\nAI is rapidly changing international commerce by automating processes and enabling smarter global decision-making." },
    { k: ['thank','thanks','appreciate'], r: "You're welcome! Feel free to ask me anything else — I'm here to help! 😊" },
    { k: ['bye','goodbye','see you'], r: "Goodbye! Best of luck with your studies at Konkuk University! 👋" },
    { k: ['who are you','what are you','your name'], r: "I'm an AI assistant built by Pariyr Roshan Kumar, a 1st year International Commerce & Business student at Konkuk University in Seoul, South Korea. I was created as a university web development project.\n\nI can help with business concepts, trade topics, writing assistance, and general questions!" },
    { k: ['pariyr','roshan','kumar'], r: "Pariyr Roshan Kumar is a 1st year International Commerce & Business student at Konkuk University in Seoul, South Korea. He built this AI assistant as part of a university assignment exploring AI-powered web applications." },
  ];

  function getReply(input) {
    const lower = input.toLowerCase();
    for (const item of knowledge) {
      if (item.k.some(kw => lower.includes(kw))) return item.r;
    }
    // Generic intelligent-sounding fallback responses
    const fallbacks = [
      `That's an interesting question about "${input.slice(0,40)}...". As an AI assistant focused on international commerce and business, I can best help with topics like trade, economics, marketing, finance, career advice, and writing. Could you rephrase or ask something along those lines?`,
      `Great question! While I may not have a detailed answer on that specific topic, I'm well-equipped to discuss international trade, business strategy, economics, and professional writing. What aspect of business are you most curious about?`,
      `I'd love to help with that! For best results, try asking me about: international trade & tariffs, supply chains, marketing, finance, GDP & economics, career & resume tips, or writing emails. What would you like to explore?`,
    ];
    return fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }

  let isLoading = false;

  function useChip(btn) {
    const input = document.getElementById('user-input');
    input.value = btn.textContent;
    autoResize(input);
    input.focus();
    document.getElementById('suggestions').style.display = 'none';
  }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 140) + 'px'; }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

  function addMessage(role, text) {
    const container = document.getElementById('messages');
    const welcome = container.querySelector('.welcome-msg');
    if (welcome) welcome.remove();
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'ai' ? '🤖' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;
    msg.appendChild(av);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function showTyping() {
    const container = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'msg ai'; msg.id = 'typing-indicator';
    const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '🤖';
    const bubble = document.createElement('div'); bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    msg.appendChild(av); msg.appendChild(bubble);
    container.appendChild(msg); container.scrollTop = container.scrollHeight;
  }

  function hideTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

  function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;
    document.getElementById('suggestions').style.display = 'none';
    addMessage('user', text);
    input.value = ''; input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();
    // Simulate thinking delay for realism
    setTimeout(() => {
      hideTyping();
      addMessage('ai', getReply(text));
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }, 800 + Math.random() * 600);
  }
</script>
</body>
</html>
